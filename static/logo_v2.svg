<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500" width="500" height="500">
  <defs>
    <linearGradient id="hexGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#F5F5F5;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#E0E0E0;stop-opacity:1" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="500" height="500" fill="#FFFFFF" rx="20"/>

  <!-- Tech Circle -->
  <circle cx="250" cy="230" r="140" fill="none" stroke="#E0E0E0" stroke-width="1"/>
  <circle cx="250" cy="230" r="155" fill="none" stroke="#66BB6A" stroke-width="2" stroke-dasharray="20 15" opacity="0.5"/>

  <!-- Central Hexagon / Banana Abstraction -->
  <g transform="translate(250, 230)">
    <!-- Hexagon Frame -->
    <path d="M0 -100 L86.6 -50 L86.6 50 L0 100 L-86.6 50 L-86.6 -50 Z" 
          fill="none" stroke="#333" stroke-width="4"/>
    
    <!-- Stylized Banana Curve inside -->
    <path d="M-40 -20 Q-60 20 -30 60 Q10 90 50 60 Q80 30 60 -10 Q40 20 -30 20" 
          fill="#FFEB3B" stroke="#FBC02D" stroke-width="2"/>
    
    <!-- Tech nodes -->
    <circle cx="-86.6" cy="-50" r="6" fill="#66BB6A" filter="url(#glow)"/>
    <circle cx="86.6" cy="50" r="6" fill="#66BB6A" filter="url(#glow)"/>
    <circle cx="0" cy="100" r="6" fill="#66BB6A" filter="url(#glow)"/>

    <!-- Connection lines -->
    <line x1="-40" y1="20" x2="-86.6" y2="-50" stroke="#66BB6A" stroke-width="2" opacity="0.6"/>
    <line x1="50" y1="60" x2="86.6" y2="50" stroke="#66BB6A" stroke-width="2" opacity="0.6"/>
  </g>

  <!-- Text -->
  <g font-family="'Inter', 'Roboto', sans-serif" text-anchor="middle">
    <text x="250" y="420" font-size="38" font-weight="700" fill="#333" letter-spacing="1">NANO<tspan fill="#66BB6A">BANANA</tspan></text>
    <text x="250" y="455" font-size="24" font-weight="300" fill="#757575" letter-spacing="8">PRO</text>
  </g>
</svg>
