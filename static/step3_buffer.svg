<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="100%" height="100%">
  <defs>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-opacity="0.1"/>
    </filter>
  </defs>
  <circle cx="100" cy="100" r="95" fill="#E8F5E9" />
  
  <!-- Eppendorf Tube -->
  <path d="M80 120 L85 170 Q100 180 115 170 L120 120 Z" fill="#FFFFFF" stroke="#333333" stroke-width="3" filter="url(#shadow)"/>
  <rect x="75" y="110" width="50" height="10" fill="#E0E0E0" stroke="#333333" stroke-width="2"/>

  <path d="M82 140 L118 140 L115 170 Q100 180 85 170 Z" fill="#A5D6A7" opacity="0.6"/>
  <rect x="75" y="100" width="50" height="10" fill="#66BB6A" stroke="#333333" stroke-width="2"/>
  <!-- Motion Lines -->
  <path d="M60 130 Q50 140 60 150 M140 130 Q150 140 140 150" fill="none" stroke="#333333" stroke-width="3" stroke-linecap="round"/>
  <!-- Buffer drops text -->
  <text x="100" y="60" font-family="sans-serif" font-size="28" font-weight="bold" fill="#66BB6A" text-anchor="middle">+ 8 gouttes</text>
  <text x="100" y="80" font-family="sans-serif" font-size="14" font-weight="bold" fill="#333333" text-anchor="middle">Tampon</text>

</svg>