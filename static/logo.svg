<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500" width="500" height="500">
  <defs>
    <linearGradient id="bananaGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFE082;stop-opacity:1" /> <!-- Light Amber -->
      <stop offset="100%" style="stop-color:#FFCA28;stop-opacity:1" /> <!-- Amber -->
    </linearGradient>
    <linearGradient id="liquidGrad" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" style="stop-color:#66BB6A;stop-opacity:1" /> <!-- Green -->
      <stop offset="100%" style="stop-color:#A5D6A7;stop-opacity:0.8" /> <!-- Light Green -->
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="4" stdDeviation="3" flood-opacity="0.15"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="500" height="500" fill="#FFFFFF" rx="40"/>
  
  <!-- Outer Ring -->
  <circle cx="250" cy="220" r="160" fill="none" stroke="#E8F5E9" stroke-width="2" stroke-dasharray="10 10"/>

  <!-- The Icon: A Banana shaped like a Retort/Flask -->
  <g transform="translate(250, 220) scale(1.2)">
    <!-- Banana Body -->
    <path d="M-40 -60 Q-80 0 -40 80 Q0 120 60 80 Q100 40 80 -40 Q60 -80 0 -80 Z" 
          fill="url(#bananaGrad)" filter="url(#shadow)"/>
    
    <!-- Green Liquid inside (Masked essentially by shape, simplified here as overlay) -->
    <path d="M-30 20 Q-60 20 -35 70 Q0 100 50 70 Q80 40 65 0 Q50 20 -30 20" 
          fill="url(#liquidGrad)" opacity="0.9"/>
          
    <!-- Bubbles -->
    <circle cx="-10" cy="10" r="4" fill="#FFFFFF" opacity="0.6">
      <animate attributeName="cy" from="10" to="-20" dur="2s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.6;0;0.6" dur="2s" repeatCount="indefinite"/>
    </circle>
    <circle cx="20" cy="30" r="6" fill="#FFFFFF" opacity="0.5">
      <animate attributeName="cy" from="30" to="-10" dur="3s" repeatCount="indefinite" begin="0.5s"/>
       <animate attributeName="opacity" values="0.5;0;0.5" dur="3s" repeatCount="indefinite"/>
    </circle>
    
    <!-- Tech accents -->
    <path d="M60 -50 L70 -60 M75 -35 L85 -45" stroke="#66BB6A" stroke-width="3" stroke-linecap="round"/>
  </g>

  <!-- Typography -->
  <g font-family="'Segoe UI', Roboto, Helvetica, Arial, sans-serif" text-anchor="middle">
    <text x="250" y="400" font-size="48" font-weight="800" fill="#333" letter-spacing="-1">NanoBanana</text>
    <text x="250" y="445" font-size="28" font-weight="300" fill="#66BB6A" letter-spacing="6">PRO</text>
  </g>
  
  <!-- DNA Helix decoration around text -->
  <path d="M150 415 Q175 425 200 415 M300 415 Q325 405 350 415" stroke="#E0E0E0" stroke-width="2" fill="none"/>

</svg>
