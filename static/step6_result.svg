<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="100%" height="100%">
  <defs>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-opacity="0.1"/>
    </filter>
  </defs>
  <circle cx="100" cy="100" r="95" fill="#E8F5E9" />
  
  <!-- Strip 1: Negatif (Intense) -->
  <rect x="60" y="40" width="25" height="100" fill="#FFFFFF" stroke="#333333" stroke-width="3" rx="4"/>
  <rect x="64" y="90" width="17" height="8" fill="#333333"/>
  <text x="72.5" y="165" font-family="sans-serif" font-size="16" font-weight="bold" fill="#333333" text-anchor="middle">Négatif</text>
  <text x="72.5" y="180" font-family="sans-serif" font-size="12" fill="#66BB6A" text-anchor="middle">Intense</text>
  
  <!-- Strip 2: Positif (Claire) -->
  <rect x="115" y="40" width="25" height="100" fill="#FFFFFF" stroke="#333333" stroke-width="3" rx="4"/>
  <rect x="119" y="90" width="17" height="8" fill="#333333" opacity="0.15"/>
  <text x="127.5" y="165" font-family="sans-serif" font-size="16" font-weight="bold" fill="#333333" text-anchor="middle">Positif</text>
  <text x="127.5" y="180" font-family="sans-serif" font-size="12" fill="#FFCA28" text-anchor="middle">Clair</text>

</svg>